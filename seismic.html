<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Seismic Activity</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #c9d1d9; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; }
    .leaflet-control-attribution { background: rgba(13,17,23,0.8) !important; color: #8b949e !important; font-size: 10px !important; }
    .leaflet-control-attribution a { color: #58a6ff !important; }
    .leaflet-control-zoom a { background: #161b22 !important; color: #c9d1d9 !important; border-color: #30363d !important; }
    .leaflet-control-zoom a:hover { background: #21262d !important; }
    #info-panel {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: rgba(13,17,23,0.92); border: 1px solid #30363d; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; line-height: 1.6; min-width: 180px;
      backdrop-filter: blur(8px);
    }
    #info-panel h3 { font-size: 13px; margin-bottom: 6px; color: #f0f6fc; }
    #info-panel .stat { display: flex; justify-content: space-between; }
    #info-panel .stat span:last-child { color: #58a6ff; font-weight: 600; }
    #info-panel #updated { font-size: 10px; color: #8b949e; margin-top: 6px; }
    #legend {
      position: absolute; bottom: 24px; left: 10px; z-index: 1000;
      background: rgba(13,17,23,0.92); border: 1px solid #30363d; border-radius: 8px;
      padding: 8px 12px; font-size: 11px; line-height: 1.8;
    }
    #legend .item { display: flex; align-items: center; gap: 6px; }
    #legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .quake-popup { font-size: 12px; line-height: 1.5; }
    .quake-popup .mag { font-size: 16px; font-weight: 700; }
    .quake-popup .mag-low { color: #3fb950; }
    .quake-popup .mag-med { color: #d29922; }
    .quake-popup .mag-high { color: #f85149; }
    .quake-popup .mag-severe { color: #ff7b72; font-size: 18px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info-panel">
    <h3>Seismic Activity (24h)</h3>
    <div class="stat"><span>Total events:</span><span id="count">—</span></div>
    <div class="stat"><span>Magnitude 4.5+:</span><span id="count45">—</span></div>
    <div class="stat"><span>Largest:</span><span id="maxmag">—</span></div>
    <div id="updated"></div>
  </div>
  <div id="legend">
    <div class="item"><span class="dot" style="background:#3fb950"></span>M &lt; 2.5</div>
    <div class="item"><span class="dot" style="background:#d29922"></span>M 2.5–4.5</div>
    <div class="item"><span class="dot" style="background:#f85149"></span>M 4.5–6.0</div>
    <div class="item"><span class="dot" style="background:#ff7b72"></span>M &gt; 6.0</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      worldCopyJump: true,
      zoomControl: true,
      minZoom: 1,
      maxZoom: 12,
    }).setView([20, 0], 2);

    // Dark-themed tile layer (CARTO dark matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a> | Data: <a href="https://earthquake.usgs.gov">USGS</a>',
      subdomains: 'abcd',
    }).addTo(map);

    let quakeLayer = null;

    function magColor(m) {
      if (m >= 6.0) return '#ff7b72';
      if (m >= 4.5) return '#f85149';
      if (m >= 2.5) return '#d29922';
      return '#3fb950';
    }

    function magRadius(m) {
      return Math.max(3, Math.min(18, m * 2.5));
    }

    function magClass(m) {
      if (m >= 6.0) return 'mag-severe';
      if (m >= 4.5) return 'mag-high';
      if (m >= 2.5) return 'mag-med';
      return 'mag-low';
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
    }

    async function loadQuakes() {
      try {
        const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (quakeLayer) map.removeLayer(quakeLayer);

        const markers = [];
        let maxMag = 0;
        let count45 = 0;

        data.features.forEach(f => {
          const mag = f.properties.mag || 0;
          const coords = f.geometry.coordinates;
          if (mag > maxMag) maxMag = mag;
          if (mag >= 4.5) count45++;

          const marker = L.circleMarker([coords[1], coords[0]], {
            radius: magRadius(mag),
            fillColor: magColor(mag),
            color: magColor(mag),
            weight: 1,
            opacity: 0.8,
            fillOpacity: 0.5,
          });

          const place = f.properties.place || 'Unknown location';
          const time = formatTime(f.properties.time);
          const cls = magClass(mag);
          marker.bindPopup(
            '<div class="quake-popup">' +
            '<div class="mag ' + cls + '">M' + mag.toFixed(1) + '</div>' +
            '<div>' + place + '</div>' +
            '<div style="color:#8b949e;font-size:11px">' + time + '</div>' +
            '<div style="margin-top:4px"><a href="https://earthquake.usgs.gov/earthquakes/eventpage/' + f.id + '" target="_blank" rel="noopener" style="color:#58a6ff">USGS details →</a></div>' +
            '</div>'
          );
          markers.push(marker);
        });

        quakeLayer = L.layerGroup(markers).addTo(map);

        document.getElementById('count').textContent = data.features.length;
        document.getElementById('count45').textContent = count45;
        document.getElementById('maxmag').textContent = maxMag > 0 ? 'M' + maxMag.toFixed(1) : '—';
        document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      } catch (err) {
        console.error('Failed to load earthquake data:', err);
        document.getElementById('updated').textContent = 'Update failed: ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      }
    }

    loadQuakes();
    // Refresh every 5 minutes
    setInterval(loadQuakes, 5 * 60 * 1000);
  </script>
</body>
</html>
